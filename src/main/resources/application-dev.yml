# Dev (Azure) — non-sensitive overrides.
# Sensitive values (DB password, JWT secret, etc.) come from
# Azure Container Apps secrets / Key Vault refs and are injected as env vars.

spring:
  jpa:
    show-sql: false

logging:
  level:
    root: INFO
    com.casadeoxala: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
