name: CD — Prod

# Deploy to the Azure Container Apps PROD environment
# when a push to 'main' succeeds CI.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy-prod:
    name: Build & Deploy (prod)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # GitHub Environment — add required reviewers here for manual gate before prod
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/casa-de-oxala-api:${{ github.event.workflow_run.head_sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/casa-de-oxala-api:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/casa-de-oxala-api:latest
          cache-to: type=inline

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_PROD }}

      - name: Deploy to Azure Container Apps (prod)
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: ${{ vars.ACR_NAME }}
          containerAppName: ${{ vars.ACA_APP_NAME_PROD }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP_PROD }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/casa-de-oxala-api:${{ github.event.workflow_run.head_sha }}
