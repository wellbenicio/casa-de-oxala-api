name: CD — Prod

# Deploy to the Azure Container Apps PROD environment
# when CI succeeds on 'main'.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  id-token: write   # Required for OIDC login to Azure

jobs:
  deploy-prod:
    name: Build & Deploy (prod)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # GitHub Environment with required reviewers = manual gate before prod.
    # Configure at: Settings → Environments → production → Required reviewers
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Azure (OIDC — no long-lived credentials)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR (via Azure CLI token — no admin password)
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/casa-de-oxala-api:${{ github.event.workflow_run.head_sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/casa-de-oxala-api:latest
          cache-from: type=registry,ref=${{ vars.ACR_NAME }}.azurecr.io/casa-de-oxala-api:latest
          cache-to: type=inline

      - name: Deploy to Azure Container Apps (prod)
        run: |
          az containerapp update \
            --name "${{ vars.ACA_APP_NAME_PROD }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.ACR_NAME }}.azurecr.io/casa-de-oxala-api:${{ github.event.workflow_run.head_sha }}"
