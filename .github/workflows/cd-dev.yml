name: CD — Dev

# Deploy to the Azure Container Apps DEV environment
# when a push to 'develop' succeeds CI.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [develop]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy-dev:
    name: Build & Deploy (dev)
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # GitHub Environment for audit trail and optional manual approval
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/casa-de-oxala-api:dev-${{ github.event.workflow_run.head_sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/casa-de-oxala-api:dev-latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/casa-de-oxala-api:dev-latest
          cache-to: type=inline

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_DEV }}

      - name: Deploy to Azure Container Apps (dev)
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: ${{ vars.ACR_NAME }}
          containerAppName: ${{ vars.ACA_APP_NAME_DEV }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP_DEV }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/casa-de-oxala-api:dev-${{ github.event.workflow_run.head_sha }}
