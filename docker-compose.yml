services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: casadeoxala
      POSTGRES_USER: casadeoxala
      POSTGRES_PASSWORD: casadeoxala
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casadeoxala"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
